<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词根分析器</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="bg-bg-primary text-text-primary min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12 max-w-6xl">
        <div class="mb-8 text-left animate-fade-in">
            <a href="javascript:void(0)" onclick="goHome()" class="inline-flex items-center px-4 py-2 bg-bg-card hover:bg-bg-module border border-border-color rounded-6 text-text-primary hover:text-brand-blue transition-all-300">
                <i class="fa fa-arrow-left mr-2"></i> 返回首页
            </a>
        </div>

        <header class="mb-12 text-center animate-fade-in">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 text-gradient">词根分析器</h1>
            <p class="text-text-secondary text-lg">输入文本，拆解词根，分析词频。点击词根，溯源内容。</p>
        </header>

        <div class="bg-bg-card rounded-8 border border-border-color p-6 mb-10 card-hover animate-fade-in" style="animation-delay: 0.1s;">
            <div class="mb-5">
                <label for="inputText" class="block text-sm font-medium text-text-primary mb-3">输入文本</label>
                <textarea id="inputText" rows="6" class="w-full px-4 py-4 bg-bg-module border border-border-color rounded-6 text-text-primary placeholder-text-secondary focus:outline-none input-focus transition-all-300 resize-none" placeholder="请输入需要分析的文本，多个关键词之间用空格、逗号或句号分隔..."></textarea>
            </div>
            <div class="flex justify-center">
                <button id="analyzeBtn" class="px-8 py-3 bg-brand-blue hover:bg-blue-600 text-white font-medium rounded-6 shadow-md hover:shadow-lg transition-all-300 flex items-center">
                    <i class="fa fa-search mr-2"></i> 拆解词根
                </button>
            </div>
        </div>

        <div id="resultContainer" class="hidden animate-fade-in" style="animation-delay: 0.2s;">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold text-text-primary">分析结果</h2>
                <button id="downloadBtn" class="px-4 py-2 bg-brand-blue hover:bg-blue-600 text-white font-medium rounded-6 shadow-md hover:shadow-lg transition-all-300 flex items-center">
                    <i class="fa fa-download mr-2"></i> 下载Excel
                </button>
            </div>

            <div class="bg-bg-card rounded-8 border border-border-color shadow-card overflow-hidden mb-10">
                <div class="overflow-x-auto scrollbar-thin">
                    <table class="w-full text-left">
                        <thead class="bg-bg-module text-text-primary">
                            <tr>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">单词根</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">词频</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">双词根</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">词频</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">三词根</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">词频</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">四词根</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">词频</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">五词根</th>
                                <th class="px-4 py-4 font-semibold border-b border-border-color">词频</th>
                            </tr>
                        </thead>
                        <tbody id="resultTableBody" class="divide-y divide-border-color">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="loadingContainer" class="hidden flex justify-center items-center py-20 animate-fade-in">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-brand-blue"></div>
        </div>

        <footer class="mt-16 text-center text-text-secondary text-sm">
            <p>© 2024 词根分析器 | VX:1036527153</p>
        </footer>
    </div>

    <div id="rootDetailModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden animate-fade-in">
        <div class="bg-bg-card rounded-8 border border-border-color shadow-xl max-w-4xl w-full max-h-[80vh] overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-border-color">
                <h3 id="modalTitle" class="text-xl font-bold text-text-primary">词根详情</h3>
                <button id="closeModalBtn" class="text-text-secondary hover:text-text-primary transition-all-300">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 max-h-[60vh] overflow-y-auto scrollbar-thin">
                <div class="mb-6">
                    <h4 class="text-lg font-semibold text-text-primary mb-4">包含该词根的关键词</h4>
                    <div id="keywordList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    </div>
                </div>
            </div>
            <div class="flex justify-end p-6 border-t border-border-color">
                <button id="copyKeywordsBtn" class="px-4 py-2 bg-brand-blue hover:bg-blue-600 text-white font-medium rounded-6 shadow-md hover:shadow-lg transition-all-300 flex items-center">
                    <i class="fa fa-copy mr-2"></i> 复制所有关键词
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/词根拆解.js"></script>
</body>
</html>
