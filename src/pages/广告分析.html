<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格数据分析工具</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="bg-dark-999 min-h-screen text-dark-100">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8 animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <button id="home-btn" class="px-4 py-2 bg-dark-950 text-dark-100 rounded-md hover:bg-dark-800 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark-999 transition-colors">
                    <i class="fa fa-home mr-2"></i>返回主页
                </button>
            </div>
            <h1 class="text-3xl font-bold text-gradient mb-2">表格数据分析工具</h1>
            <p class="text-dark-500">数据量大网页可能会有卡顿，如果提示表头缺失可能是亚马逊对表格有所调整，点击表头即可更改为老版表头。如嫌麻烦联系网页底部VX反馈更新。</p>
        </header>

        <main>
            <section class="mb-8 animate-slide-up">
                <h2 class="text-xl font-semibold text-dark-100 mb-4">数据输入</h2>
                <div class="bg-dark-950 rounded-lg shadow-md p-6 border border-dark-800 card-hover">
                    <label for="data-input" class="block text-sm font-medium text-dark-300 mb-2">粘贴表格数据</label>
                    <textarea id="data-input" rows="6" class="w-full px-3 py-2 border border-dark-800 rounded-md bg-dark-999 text-dark-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请从Excel、WPS等表格软件复制数据（包含表头）粘贴到此处..."></textarea>
                    <div class="mt-4 flex justify-end">
                        <button id="parse-btn" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-dark-999 transition-colors">
                            解析数据
                        </button>
                    </div>
                </div>
            </section>

            <section id="table-section" class="mb-8 hidden animate-slide-up">
                <h2 class="text-xl font-semibold text-dark-100 mb-4">数据预览与编辑</h2>
                <div class="bg-dark-950 rounded-lg shadow-md p-6 border border-dark-800 card-hover">
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-sm text-dark-500">
                            显示前10行数据预览
                        </div>
                        <div id="header-status" class="text-sm font-medium"></div>
                    </div>

                    <div class="table-container">
                        <table id="data-table" class="table-fixed-layout">
                        </table>
                    </div>

                    <div class="mt-4 flex justify-end">
                        <button id="analyze-btn" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-dark-999 transition-colors">
                            分析数据
                        </button>
                    </div>
                </div>
            </section>

            <section id="result-section" class="mb-8 hidden animate-slide-up">
                <h2 class="text-xl font-semibold text-dark-100 mb-4">分析结果</h2>
                <div class="bg-dark-950 rounded-lg shadow-md p-6 border border-dark-800 card-hover">
                    <div class="table-container">
                        <table id="result-table" class="table-fixed-layout">
                        </table>
                    </div>

                    <div class="mt-4 flex justify-end">
                        <button id="download-btn" class="px-4 py-2 bg-success text-white rounded-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-dark-999 transition-colors">
                            <i class="fa fa-download mr-2"></i>下载表格
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="mt-12 text-center text-dark-500 text-sm animate-fade-in">
            <p>© 2026 表格数据分析工具 | VX:W1036527153</p>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-dark-800 text-dark-100 px-4 py-2 rounded-md shadow-lg hidden transform transition-all duration-300 translate-y-10 opacity-0">
        <span id="toast-message"></span>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-950 p-6 rounded-lg shadow-lg border border-dark-800 flex flex-col items-center">
            <div class="spinner mb-4"></div>
            <p id="loading-text" class="text-dark-100">正在处理数据...</p>
        </div>
    </div>

    <script type="module" src="../js/广告分析.js"></script>
</body>
</html>
