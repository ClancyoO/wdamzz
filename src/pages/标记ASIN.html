<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标记ASIN工具</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <button id="home-btn" class="px-4 py-2 bg-bg-module hover:bg-border-color text-text-primary rounded-md text-sm transition-colors flex items-center border border-border-color">
                    <i class="fa fa-home mr-2"></i> 返回主页
                </button>
            </div>
            <div class="text-center">
                <h1 class="text-4xl font-bold text-gradient mb-2">标记ASIN工具</h1>
                <p class="text-text-secondary">上传表格，自动标记指定ASIN所在行</p>
            </div>
        </header>

        <main>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-bg-card rounded-lg border border-border-color p-5 card-hover">
                    <div class="section-header">
                        <span class="section-title"><i class="fa fa-file-excel-o mr-2 text-primary"></i>上传表格</span>
                    </div>
                    <div class="upload-zone" id="uploadZone">
                        <input type="file" id="fileInput" accept=".csv,.xls,.xlsx" class="hidden">
                        <div class="upload-icon"><i class="fa fa-cloud-upload"></i></div>
                        <div class="upload-text">点击或拖拽上传表格文件</div>
                        <div class="upload-hint">支持 CSV、XLS、XLSX 格式</div>
                    </div>
                    <div id="fileInfo" class="file-info hidden">
                        <i class="fa fa-file-excel-o text-primary mr-2"></i>
                        <span id="fileName"></span>
                        <span id="fileSize" class="text-text-secondary text-xs ml-2"></span>
                        <button id="removeFile" class="ml-auto text-text-secondary hover:text-red-500 transition-colors">
                            <i class="fa fa-times"></i>
                        </button>
                    </div>
                </div>

                <div class="bg-bg-card rounded-lg border border-border-color p-5 card-hover">
                    <div class="section-header">
                        <span class="section-title"><i class="fa fa-barcode mr-2 text-primary"></i>ASIN列表</span>
                        <span class="section-count" id="asinCount">0 个</span>
                    </div>
                    <textarea class="input-area" id="asinInput" rows="6" placeholder="每行输入一个ASIN&#10;例如：&#10;B0C1TF6051&#10;B09N5RRWNW&#10;B09V3K1J0B"></textarea>
                    <div class="mt-3 flex gap-2">
                        <button class="action-btn" id="markBtn" onclick="markAsin()">
                            <i class="fa fa-marker mr-1"></i> 标记ASIN
                        </button>
                        <button class="action-btn secondary" id="exportBtn" onclick="exportResult()" disabled>
                            <i class="fa fa-download mr-1"></i> 导出结果
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultSection" class="hidden">
                <div class="bg-bg-card rounded-lg border border-border-color p-5 card-hover">
                    <div class="section-header mb-4">
                        <span class="section-title"><i class="fa fa-table mr-2 text-primary"></i>标记结果</span>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-text-secondary" id="resultStats"></span>
                            <button class="action-btn secondary" onclick="toggleHighlight()">
                                <i class="fa fa-eye mr-1"></i> <span id="toggleText">隐藏标记</span>
                            </button>
                        </div>
                    </div>
                    <div class="table-container" id="tableContainer">
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center text-text-secondary text-sm">
            <p>© 2026 标记ASIN工具 | VX:W1036527153</p>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-bg-card border border-border-color text-text-primary px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center z-50">
        <i class="fa fa-check-circle mr-2"></i>
        <span id="toastMessage">操作成功</span>
    </div>

    <script type="module" src="../js/标记ASIN.js"></script>
</body>
</html>
